name: keep-render-awake
# Giu cho web tren Render khong "ngu" (Free tier ngu sau ~15 phut khong truy cap).
# Cu 5 phut ping /healthz mot lan. Repo public => khong gioi han phut Actions.

on:
  schedule:
    - cron: "*/5 * * * *"   # moi 5 phut (gio UTC, khong quan trong vi la chu ky)
  workflow_dispatch:          # cho phep bam chay tay tu tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: curl -fsS --max-time 45 https://pain1db.onrender.com/healthz || true
